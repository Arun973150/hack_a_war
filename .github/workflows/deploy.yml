# Red Forge CI/CD Pipeline — Deploy to EC2
#
# Required GitHub Actions Secrets:
#   EC2_HOST      — EC2 public IP address
#   EC2_SSH_KEY   — Private key content (PEM format) for SSH access
#   EC2_USER      — SSH username (default: ubuntu)
#   GHCR_TOKEN    — GitHub PAT with packages:write scope
#
name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Test: Verify Python imports work ──────────────────────────────────────
  test:
    name: Import Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip uv
          uv pip install --system -r requirements.txt 2>/dev/null || uv pip install --system -e . 2>/dev/null || echo "No standard install method found, continuing..."

      - name: Verify core imports
        run: |
          python -c "import config"
          python -c "import api"
          python -c "import agents"
          python -c "import ingestion"
          python -c "import monitoring"
          python -c "import org_context"
          python -c "import knowledge"
          echo "All core imports passed"

  # ─── Build: Docker images to GHCR ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:latest
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy: SSH into EC2 and restart containers ──────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/red_forge
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            echo "Waiting for health check..."
            sleep 10
            curl -sf http://localhost:8000/health || echo "WARNING: Health check failed"
            echo "Deploy complete"
