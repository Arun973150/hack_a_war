# Red Forge CI/CD Pipeline — Deploy to EC2
#
# Required GitHub Actions Secrets:
#   EC2_HOST      — EC2 public IP address
#   EC2_SSH_KEY   — Private key content (PEM format) for SSH access
#   EC2_USER      — SSH username (default: ubuntu)
#   GHCR_TOKEN    — GitHub PAT with packages:write scope
#
name: CI (Build & Push)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Test: Verify Python imports work ──────────────────────────────────────
  test:
    name: Import Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip uv
          uv pip install --system -r requirements.txt 2>/dev/null || uv pip install --system -e . 2>/dev/null || echo "No standard install method found, continuing..."

      - name: Verify core imports
        run: |
          python -c "import config"
          python -c "import api"
          python -c "import agents"
          python -c "import ingestion"
          python -c "import monitoring"
          python -c "import org_context"
          python -c "import knowledge"
          echo "All core imports passed"

  # ─── Build: Docker images to GHCR ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/api:latest
            ghcr.io/${{ env.REPO_LC }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/dashboard:latest
            ghcr.io/${{ env.REPO_LC }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


