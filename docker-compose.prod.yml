version: "3.9"

services:

  # ─── Qdrant Vector Store ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: redforge_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redforge_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redforge_redis_2025}

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: redforge_api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redforge_redis_2025}@redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant
      - redis
    volumes:
      - ./redforge-13436394829f.json:/app/redforge-13436394829f.json:ro

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://32.192.255.100}
    container_name: redforge_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://32.192.255.100}
    depends_on:
      - api

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: redforge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_certs_data:/var/www/certbot
    depends_on:
      - api
      - frontend

volumes:
  qdrant_data:
  redis_data:
  nginx_certs:
  nginx_certs_data:
