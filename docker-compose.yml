# PostgreSQL + Storage → Supabase (cloud, no local container needed)
# Only self-hosted services remain below

services:

  # ─── Qdrant Vector Store ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: redforge_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ─── Neo4j Knowledge Graph ────────────────────────────────────────────────
  # Using Neo4j Aura Cloud — no local container needed
  # neo4j:
  #   image: neo4j:5.20-community
  #   ...uncomment if switching to local

  # ─── Redis (Message Queue) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ─── Prefect Server ───────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: redforge_prefect
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    environment:
      # Uses Supabase PostgreSQL
      PREFECT_API_DATABASE_CONNECTION_URL: ${DATABASE_URL}
      PREFECT_SERVER_API_HOST: 0.0.0.0
    env_file:
      - .env
    command: prefect server start
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: redforge_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: redforge_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: redforge_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── Red Forge API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: redforge_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  prefect_data:
  prometheus_data:
  grafana_data:
